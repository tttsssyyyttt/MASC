# MAPPO + GNN Algorithm Configuration
algorithm: mappo

# Network
hidden_dim: 128

# Training
lr_actor: 0.0002
lr_critic: 0.001
gamma: 0.99
gae_lambda: 0.95
clip_epsilon: 0.2
epochs_per_update: 3
mini_batch_size: 64
entropy_coef: 0.02
value_loss_coef: 0.5
max_grad_norm: 0.5

# GNN encoder
use_gnn: true
