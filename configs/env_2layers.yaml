# 2-layer supply chain: 2 roots -> 3 terminals
# Terminals have 2 upstream nodes each (shared suppliers)
#       0       1
#      / \     / \
#     2   3   4   5
#    / \ / \ / \ / \
#   (each terminal connected to both roots via middle layer)
#
# Simplified: 2 roots directly supply 3 terminals
#       0       1
#      /|\    / |\
#     / | \  /  | \
#    2  3  4 (each has 2 upstream)
#
# Actually: nodes 2,3,4 each connect to both 0 and 1
num_nodes: 5
edges: [[0, 2], [0, 3], [1, 3], [1, 4], [0, 4]]
layers: [0, 0, 1, 1, 1]

# Node 0: root (no upstream), Node 1: root (no upstream)
# Node 2: upstream=[0], Node 3: upstream=[0,1], Node 4: upstream=[1,0]
# So node 3 and 4 have 2 upstream nodes

H: [1.0, 1.0, 2.0, 2.0, 2.0]
B: [5.0, 5.0, 4.0, 4.0, 4.0]

max_order: 20
lead_time: 2
episode_len: 30

# Demand
demand_type: poisson
demand_mean: 8.0
demand_std: 3.0

# Reward
alpha: 0.5
reward_scale: 0.01
stockout_penalty: 20.0
fill_rate_bonus: 5.0

# Initial state
init_inventory: 20.0
init_pipeline: 8.0

# Transport (0 = pure inventory)
transport_coeff: 0.0

seed: 42
