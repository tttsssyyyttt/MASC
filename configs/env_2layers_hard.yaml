# 2-layer supply chain — HIGH DEMAND variant (harder)
# max_order/demand = 20/12 = 1.67x (vs original 20/8 = 2.5x)
num_nodes: 5
edges: [[0, 2], [0, 3], [1, 3], [1, 4], [0, 4]]
layers: [0, 0, 1, 1, 1]

H: [1.0, 1.0, 2.0, 2.0, 2.0]
B: [5.0, 5.0, 4.0, 4.0, 4.0]

max_order: 20
lead_time: 2
episode_len: 30

demand_type: poisson
demand_mean: 10.0
demand_std: 4.0

alpha: 0.5
reward_scale: 0.01
stockout_penalty: 20.0
fill_rate_bonus: 5.0

init_inventory: 20.0
init_pipeline: 8.0

transport_coeff: 0.0
seed: 42
